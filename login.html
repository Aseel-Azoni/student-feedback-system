<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Feedback System</title>
    <link rel="stylesheet" href="css/style.css">
<script src="js/script.js"></script>
</head>
<body>

<header>
    <div class="container">
        <h1 class="site-title">Student Feedback System</h1>
        <nav>
            <ul class="nav-list">
                <li><a href="index.html">Home</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="About.html">About</a></li>
            </ul>
        </nav>
    </div>
</header>

<main>
    <section class="form-section">
        <div class="form-container">
            <h2>Student Login</h2>
            <p>Please enter your email and password to access your account.</p>

            <form onsubmit="return validateLoginForm();">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password">

                <button type="submit">Login</button>
            </form>

            <p class="form-note">
                Do not have an account? <a href="register.html">Register here</a>
            </p>
        </div>
    </section>
</main>

<footer>
    <div class="container">
        <p>&copy; 2026 Yanbu Industrial College - CS381 Project</p>
    </div>
</footer>

</body>
</html>
